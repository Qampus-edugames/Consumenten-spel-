<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Consumptie Story Game</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#87ceeb;
  overflow:hidden;
}

/* === GAME SCHERM === */
#game {
  width:100vw;
  height:100vh;
  position:relative;
}

/* === ACHTERGROND === */
.background {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  transition:1s;
}

/* === PERSONAGE === */
#player {
  position:absolute;
  bottom:20px;
  left:50px;
  width:80px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform:translateY(0px);}
  to { transform:translateY(-10px);}
}

/* === GAME BOX === */
.ui {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  padding:15px;
  text-align:center;
}

/* === KNOPPEN === */
button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0078d4;
  color:white;
  font-size:14px;
}
button:hover { background:#005fa3; }

/* === SCORE === */
.score {
  font-weight:bold;
  margin-bottom:5px;
}

</style>

</head>

<body>

<div id="game">

  <div id="bg" class="background"></div>

  <img id="player" src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png">

  <div class="ui">
    <div class="score">
      💰 <span id="geld">100</span> |
      😊 <span id="geluk">50</span> |
      📉 <span id="schuld">0</span>
    </div>

    <p id="tekst"></p>
    <div id="keuzes"></div>
  </div>

</div>

<script>

let geld=100;
let geluk=50;
let schuld=0;
let dag=1;

function update(){
  document.getElementById("geld").innerText=geld;
  document.getElementById("geluk").innerText=geluk;
  document.getElementById("schuld").innerText=schuld;
}

/* === ACHTERGRONDEN === */
function setBG(type){
  let bg = document.getElementById("bg");

  if(type=="mall"){
    bg.style.backgroundImage="url('https://images.unsplash.com/photo-1515169067865-5387ec356754?auto=format&fit=crop&w=1500&q=80')";
  }
  if(type=="phone"){
    bg.style.backgroundImage="url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=1500&q=80')";
  }
  if(type=="home"){
    bg.style.backgroundImage="url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1500&q=80')";
  }
  if(type=="fastfood"){
    bg.style.backgroundImage="url('https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=1500&q=80')";
  }
}

/* === GAME LOGICA === */

function level(){

update();

/* DAGEN */
if(dag==1){
setBG("mall");
tekst("Dag 1: Je gaat shoppen 🛍️");
keuzes(`
<button onclick="next(()=>{geld-=80; geluk+=20})">👕 Merk €80</button>
<button onclick="next(()=>{geld-=30})">👕 Goedkoop €30</button>
`);
}

if(dag==2){
setBG("phone");
tekst("Dag 2: Influencer zegt: koop telefoon!");
keuzes(`
<button onclick="next(()=>{geld-=100})">📱 Koop</button>
<button onclick="next(()=>{schuld+=100})">💳 Leen</button>
<button onclick="next(()=>{})">❌ Niet</button>
`);
}

if(dag==3){
setBG("home");
tekst("Dag 3: Spotify abonnement?");
keuzes(`
<button onclick="next(()=>{geld-=10; geluk+=5})">🎵 Ja</button>
<button onclick="next(()=>{})">❌ Nee</button>
`);
}

if(dag==4){
setBG("home");
tekst("Dag 4: Netflix abonnement?");
keuzes(`
<button onclick="next(()=>{geld-=15})">📺 Ja</button>
<button onclick="next(()=>{})">❌ Nee</button>
`);
}

if(dag==5){
setBG("mall");
tekst("Dag 5: SALE!");
keuzes(`
<button onclick="next(()=>{geld-=50})">🛍️ Kopen</button>
<button onclick="next(()=>{})">❌ Niet nodig</button>
`);
}

if(dag==6){
setBG("fastfood");
tekst("Dag 6: Vrienden willen fastfood");
keuzes(`
<button onclick="next(()=>{geld-=15; geluk+=10})">🍔 Mee</button>
<button onclick="next(()=>{})">❌ Thuis</button>
`);
}

if(dag==7){
setBG("mall");
tekst("Dag 7: Nieuwe game!");
keuzes(`
<button onclick="next(()=>{geld-=60})">🎮 Kopen</button>
<button onclick="next(()=>{})">❌ Wachten</button>
`);
}

if(dag==8){
setBG("home");
tekst("Dag 8: Geld bijna op...");
keuzes(`
<button onclick="next(()=>{schuld+=50})">💳 Lenen</button>
<button onclick="next(()=>{})">❌ Niet</button>
`);
}

if(dag==9){
setBG("home");
tekst("Dag 9: Abonnement loopt door!");
keuzes(`
<button onclick="next(()=>{geld-=15})">📺 Betalen</button>
<button onclick="next(()=>{})">❌ Stoppen</button>
`);
}

if(dag==10){
einde();
}

}

function tekst(t){
document.getElementById("tekst").innerHTML=t;
}

function keuzes(k){
document.getElementById("keuzes").innerHTML=k;
}

function next(effect){
effect();

/* BEWEGING */
let player = document.getElementById("player");
player.style.left = Math.random()*300+"px";

dag++;
level();
}

/* EINDE */
function einde(){

update();

let resultaat="";

if(schuld>0){
resultaat="⚠️ Je hebt schulden!";
}
else if(geld<20){
resultaat="💸 Je geld is bijna op!";
}
else{
resultaat="🧠 Jij bent een slimme consument!";
}

tekst("🏁 Einde van jouw verhaal");
keuzes(`<h2>${resultaat}</h2><button onclick="reset()">🔄 Opnieuw</button>`);
}

/* RESET */
function reset(){
geld=100;
geluk=50;
schuld=0;
dag=1;
level();
}

level();

</script>

</body>
</html>
