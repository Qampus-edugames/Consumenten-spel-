<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumptie Quest Deluxe</title>
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#111;color:#fff;overflow:hidden}
#bg{position:fixed;inset:0;background-size:cover;background-position:center;transition:1s}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45)}
#game{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column}
.top{padding:10px;background:rgba(0,0,0,.5)}
.stats{display:flex;gap:15px;flex-wrap:wrap}
.progress{height:14px;background:#555;border-radius:10px;overflow:hidden;margin-top:8px}
.bar{height:100%;background:#4caf50}
.main{flex:1;display:flex;align-items:flex-end;justify-content:space-between;padding:20px}
.char{width:180px;animation:bounce 2s infinite}
@keyframes bounce{50%{transform:translateY(-10px)}}
.panel{background:rgba(255,255,255,.95);color:#111;padding:18px;border-radius:12px;margin:15px;max-width:900px}
#choices button{display:block;width:100%;margin:8px 0;padding:12px;border:none;border-radius:8px;background:#1565c0;color:white;cursor:pointer}
.badge{display:inline-block;background:#eee;color:#111;padding:6px 10px;border-radius:20px;margin:4px}
.start{text-align:center;padding:40px}
input{padding:10px}
</style>
</head>
<body>
<div id="bg"></div><div id="overlay"></div>
<div id="game"><div id="app"></div></div>
<script>
const boy="https://cdn-icons-png.flaticon.com/512/4140/4140048.png";
const girl="https://cdn-icons-png.flaticon.com/512/6997/6997662.png";
let avatar=boy,name="Speler",money=250,happy=50,debt=0,aware=50,badges=[],i=0;

const scenes=[
{bg:"https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600",title:"Winkelcentrum",npc:"Noah",text:"Iedereen koopt nieuwe sneakers.",c:[["Koop merk €120",()=>{money-=120;aware-=15}],["Goedkoper €50",()=>{money-=50;aware+=10}],["Niet kopen",()=>{aware+=15;badge('Kritische Denker')}]]},
{bg:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1600",title:"Influencer",npc:"Liv",text:"Een influencer promoot een telefoon.",c:[["Direct kopen",()=>{money-=180;aware-=20}],["Reviews lezen",()=>{aware+=15}],["Overslaan",()=>{aware+=20}]]},
{bg:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=1600",title:"Fastfood",npc:"Vrienden",text:"Ga je mee eten?",c:[["Ja €15",()=>{money-=15;happy+=10}],["Eigen lunch",()=>{aware+=10}],["Grote deal €25",()=>{money-=25;happy+=15;aware-=10}]]},
{bg:"https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600",title:"Sale",npc:"Advertentie",text:"50% korting!",c:[["Veel kopen",()=>{money-=80;aware-=15}],["Alleen nodig",()=>{money-=20;aware+=10}],["Niets",()=>{aware+=15}]]},
{bg:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=1600",title:"Streaming",npc:"Thuis",text:"Welke abonnementen neem je?",c:[["Alles",()=>{money-=25}],["1 abonnement",()=>{money-=10;aware+=5}],["Geen",()=>{aware+=10}]]},
{bg:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1600",title:"Schoolreis",npc:"Docent",text:"Je krijgt zakgeld.",c:[["Alles uitgeven",()=>{money-=30}],["Deels sparen",()=>{money-=15;aware+=10}],["Bewaren",()=>{aware+=15}]]},
{bg:"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=1600",title:"Nieuwe Game",npc:"Klasgenoot",text:"Iedereen speelt hem.",c:[["Direct kopen",()=>{money-=60}],["Wachten",()=>{aware+=15}],["Reviews",()=>{aware+=10}]]},
{bg:"https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=1600",title:"Budget",npc:"Ouder",text:"Je saldo wordt laag.",c:[["Lenen",()=>{debt+=100;badge('Lener')}],["Budget maken",()=>{aware+=20;badge('Budgetbaas')}],["Uitstellen",()=>{aware+=15}]]},
{bg:"https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1600",title:"Groepsproject",npc:"Team",text:"Koop je dure materialen?",c:[["Ja",()=>{money-=40}],["Vergelijk prijzen",()=>{aware+=10}],["Leen materialen",()=>{aware+=15}]]},
{bg:"https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?w=1600",title:"Festival",npc:"Vriend",text:"Koop je VIP tickets?",c:[["VIP",()=>{money-=90;happy+=20}],["Normaal",()=>{money-=35}],["Niet gaan",()=>{aware+=5}]]},
{bg:"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1600",title:"Online cursus",npc:"Mentor",text:"Investeren in jezelf?",c:[["Ja €30",()=>{money-=30;aware+=20;badge('Zelfontwikkelaar')}],["Nee",()=>{}],["Gratis alternatief",()=>{aware+=10}]]},
{bg:"https://images.unsplash.com/photo-1460317442991-0ec209397118?w=1600",title:"Einde week",npc:"Reflectie",text:"Kijk terug op je keuzes.",c:[["Reflecteren",()=>{aware+=10}],["Verder",()=>{}],["Budget check",()=>{aware+=15}]]}
];

function beep(){
 const a=new(window.AudioContext||window.webkitAudioContext)();
 const o=a.createOscillator(); const g=a.createGain();
 o.connect(g); g.connect(a.destination); o.start();
 g.gain.setValueAtTime(.05,a.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.15);
 o.stop(a.currentTime+.15);
}
function speak(t){if(speechSynthesis){speechSynthesis.cancel();speechSynthesis.speak(new SpeechSynthesisUtterance(t));}}
function badge(b){if(!badges.includes(b))badges.push(b);}
function start(){
app.innerHTML=`<div class="start panel"><h1>Consumptie Quest Deluxe</h1>
<p>Naam:</p><input id=n><br><br>
<button onclick="pick('boy')">👦 Jongen</button>
<button onclick="pick('girl')">👧 Meisje</button></div>`
}
function pick(g){name=document.getElementById('n').value||'Speler';avatar=g==='boy'?boy:girl;render();}
function hud(){return `<div class='top'><div class='stats'>💰€${money} 😊${happy} 💳${debt} 🧠${aware}</div><div class='progress'><div class='bar' style='width:${i/scenes.length*100}%'></div></div></div>`}
function render(){
 if(i>=scenes.length)return end();
 let s=scenes[i];
 bg.style.backgroundImage=`url(${s.bg})`;
 app.innerHTML=hud()+`<div class='main'><img class='char' src='${avatar}'><div class='panel'><h2>${s.title}</h2><p><b>${s.npc}:</b> ${s.text}</p><button onclick="speakScene()">🔊 Voorlezen</button><div id='choices'></div></div><img class='char' src='${girl}'></div>`;
 let c=document.getElementById('choices');
 s.c.forEach(x=>{let b=document.createElement('button');b.textContent=x[0];b.onclick=()=>{beep();x[1]();i++;render();};c.appendChild(b);});
}
function speakScene(){speak(scenes[i].text);}
function end(){
 let type="Gemiddelde Consument",tips="<li>Denk na voor je koopt.</li>";
 if(debt>=100){type="Impulsieve Koper";tips="<li>Maak een budget.</li><li>Leen minder.</li>";}
 else if(aware>=130){type="Bewuste Consument";tips="<li>Ga zo door.</li>";}
 else if(money>=180){type="Spaarder";tips="<li>Gebruik spaargeld doelgericht.</li>";}
 if(aware>=120) badge("Bewuste Keuze");
 if(money>=200) badge("Topspaarder");
 app.innerHTML=`<div class='panel'><h1>🏆 Eindrapport</h1>
 <h2>${name} - ${type}</h2>
 <p>💰 €${money} | 😊 ${happy} | 💳 ${debt} | 🧠 ${aware}</p>
 <h3>Badges</h3>${badges.map(b=>`<span class='badge'>${b}</span>`).join('')||'Geen'}
 <h3>Tips</h3><ul>${tips}</ul>
 <button onclick='location.reload()'>Opnieuw spelen</button></div>`;
}
start();
</script>
</body>
</html>
